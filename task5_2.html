<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> nested table</title>
</head>

<body align="center" bgcolor="pink">
    <font size="5">
        <h1>
            <marquee bgcolor="blue" behavior="alternate">Image Gallery Using Tables and Nested Table</marquee>
        </h1>
        <table border="10" cellspacing="0" cellpading="100" align="center" bgcolor="black">
            <tr>
                <td>
                    <table border="10" cellspacing="10" cellpading="100" bgcolor="yellow">
                        <tr>
                            <th align="left">Mountains Gallery</th>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig1.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Mountain View</td>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig2.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Snowy Peaks</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <table border="10" cellspacing="10" cellpading="100" bgcolor="yellow">
                        <tr>
                            <th align="left">Forest Gellery</th>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig3.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Green Forest</td>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig4.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Forest Path</td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <table border="10" cellspacing="10" cellpading="100" bgcolor="red">
                        <tr>
                            <th align="left">Beach Gallery</th>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig5.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Sunny Beach</td>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig6.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Ocean Waves</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <table border="10" cellspacing="10" cellpading="100" bgcolor="red">
                        <tr>
                            <th align="left">City Gallery</th>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig7.png"></td>
                        </tr>
                        <tr>
                            <td align="left">City Street</td>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig8.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Night Skyline</td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <table border="10" cellspacing="10" cellpading="100" bgcolor="yellow">
                        <tr>
                            <th align="left">Wildlife Gallery</th>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig10.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Fox</td>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig11.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Dog</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <table border="10" cellspacing="10" cellpading="100" bgcolor="yellow">
                        <tr>
                            <th align="left">Lake Gallery</th>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig12.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Beautiful Lake</td>
                        </tr>
                        <tr>
                            <td><img src="all_images/fig13.png"></td>
                        </tr>
                        <tr>
                            <td align="left">Lake Reflection</td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </font>
</body>

</html>
