<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      <table border="1" cellspacing="0">
        <tr>
            <td>
                <table cellspacing="100" cellpadding="10">

                    <tr align="center">
                        <td>
                            <form>
                                <fieldset>
                                    <font align="center" color="navy">
                                        <h3>Login form</h3>
                                        <hr>
                                    </font>
                                   
                                    <table border="1" bgcolor="gray">
                                        <tr>
                                            <td><label>UserName:</label></td>
                                            <td><input type="text" name="full name" required></td>
                                        </tr>
                                        <tr>
                                            <td><label>Password:</label></td>
                                            <td><input type="password" name="password" required></td>
                                        </tr>
                    
                                        
                                    </table>
                                    <font align="left">
                                        <p>
                                            <input type="checkbox" name="Remember Me:" required>
                                            <label>Remember Me:</label>
                                            </p>
                                    </font>
                                    <hr>
                                    <input type="button" name="login" value="Login">
                                    <input type="reset" name="Reset" value="Reset">
                                </fieldset>
                            </form>
                        </td>
                        <td>
                            <form>
                                <fieldset>
                                     <font align="center" color="navy">
                                        <h3>Event Registration</h3>
                                        <hr>
                                    </font>
                                   
                                    <table border="1" bgcolor="gray">
                                        <tr>
                                            <td><label>Name:</label></td>
                                            <td><input type="text" name="full name" required></td>
                                        </tr>
                                         <tr>
                                            <td><label>Email:</label></td>
                                            <td><input type="email" name="email"></td>
                                        </tr>
                                         <tr>
                                            <td><label>Select Event:</label></td>
                                            <td>
                                                <select>
                                                   <option name="Conference">Conference</option>
                                                   <option name="Workshop">Workshop</option>
                                                   <option name="Seminar">Seminar</option>
                                               </select>
                                           </td>
                                        </tr>
                                    </table>
                                    <input type="button" name="register" value="register">
                                    <input type="button" name="Cancel" value="Cancel">
                                </fieldset>
                            </form>
                        </td>
                 
                    </tr>
                    <tr align="center">
                        <td>
                            <form>
                                <fieldset>
                                    <font align="center" color="navy">
                                        <h3>Survey Form</h3>
                                    </font>
                                    <hr>
                                    
                                    <table border="1" width="250">
                                        <tr bgcolor="gray">
                                            <th>How satisfied are you?</th>
                                           
                                        </tr>
                                        <tr>
                                            <td><input type="radio" name="Very Satisfied">Very Satisfied</td>
                                            
                                        </tr>
                                         <tr>
                                           
                                            <td><input type="radio" name="Neutral">Neutral</td>
                                       
                                        </tr>
                                         <tr>
                                      
                                             <td><input type="radio" name="Dissatisfied">Dissatisfied</td>
                                        </tr>
                                       
                                    </table>
                                    <font align="left"><p>
                                       <label>Comments:</label><br> 
                                       <textarea ></textarea></p>
                                    </font>
                                  
                                    <input type="button" name="register" value="Register">
                                    <input type="button" name="Cancel" value="Cancel">
                                </fieldset>
                            </form>
                        </td>
                        <td>
                            <form>
                                <fieldset>
                                    <font align="center" color="navy">
                                        <h3>Hotel Booking</h3>
                                    </font>
                                    <hr>
                                    <img src="all_images/fig12.png" width="265" height="100">
                                    </font>
                                    <table border="1">
                                        <tr>
                                            <td><label>Check-in Date:</label>
                                            <input type="text" name="Check-in Date"></td>
                                        </tr>
                                        <tr>
                                            <td><label>Check-out Date:</label>
                                            <input type="text" name="Check-out Date"></td>
                                        </tr>
                                        <tr>
                                            <td><label>Number of Guests:</label>
                                                <select></select>
                                            </td>
                                            
                                        </tr>
                                       
                                    </table>
                                     <input type="button" name="booknow" value="Book Now">
                                    <input type="button" name="Cancel" value="Cancel">
                                </fieldset>
                            </form>
                        </td>
                        <td>
                            <form>
                                <fieldset>
                                    <font align="center" color="navy">
                                        <h3>Job Application</h3>
                                        <hr>
                                    </font>
                                   
                                    <table border="1" bgcolor="gray">
                                        <tr>
                                            <td><label>Full Name:</label>
                                            <input type="text" name="full name" required></td>
                                        </tr>
                                        <tr>
                                            <td><label>Position Applied:</label>
                                            <input type="text" name="Position Applied" required></td>
                                        </tr>
                    
                                        
                                    </table>
                                   <font align="left">
                                        <ul type="none">
                                            <li>Qualifications:</li>
                                            <li>
                                                <ol type="disk">
                                                    <li>Resume</li>
                                                    <li>Cover Letter</li>
                                                    <li>Reference</li>
                                                </ol>
                                            </li>
                                        </ul>
                                    </font>
                                    <hr>
                                    <input type="button" name="apply" value="Apply">
                                    <input type="reset" name="Reset" value="Reset">
                                </fieldset>
                            </form>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
